name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Multi-Platform Binaries
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Game
        run: |
          mkdir -p bin
          find src -name "*.java" > sources.txt
          javac -encoding UTF-8 -d bin @sources.txt

      - name: Create JAR
        run: |
          cp resources/fonts/*.ttf bin/ || true
          cp resources/app_logo.png bin/ || true
          cd bin
          echo "Main-Class: Main" > manifest.txt
          jar cfm ../Samarbhumi.jar manifest.txt .
          cd ..

      - name: Packaging (Windows - Full Setup Installer)
        if: matrix.os == 'windows-latest'
        run: |
          magick resources/app_logo.png -define icon:auto-resize=256,128,64,48,32,16 resources/app_logo.ico
          jpackage --type exe --name "Samarbhumi" --input . --main-jar Samarbhumi.jar --main-class Main \
            --icon resources/app_logo.ico \
            --win-shortcut --win-menu --win-dir-chooser \
            --app-version 2.0.0 \
            --vendor "Shunya Labs" \
            --verbose
          jpackage --type msi --name "Samarbhumi" --input . --main-jar Samarbhumi.jar --main-class Main \
            --icon resources/app_logo.ico \
            --win-shortcut --win-menu --win-dir-chooser \
            --app-version 2.0.0 \
            --vendor "Shunya Labs" \
            --verbose

      - name: Packaging (macOS - App Bundle & Disk Image)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir MyIcon.iconset
          sips -z 16 16     resources/app_logo.png --out MyIcon.iconset/icon_16x16.png
          sips -z 32 32     resources/app_logo.png --out MyIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     resources/app_logo.png --out MyIcon.iconset/icon_32x32.png
          sips -z 64 64     resources/app_logo.png --out MyIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   resources/app_logo.png --out MyIcon.iconset/icon_128x128.png
          sips -z 256 256   resources/app_logo.png --out MyIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   resources/app_logo.png --out MyIcon.iconset/icon_256x256.png
          sips -z 512 512   resources/app_logo.png --out MyIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   resources/app_logo.png --out MyIcon.iconset/icon_512x512.png
          iconutil -c icns MyIcon.iconset -o resources/app_logo.icns
          jpackage --type dmg --name "Samarbhumi" --input . --main-jar Samarbhumi.jar --main-class Main \
            --icon resources/app_logo.icns \
            --license-file INSTALLER_INFO.txt \
            --app-version 2.0.0 \
            --vendor "Shunya Labs" \
            --mac-package-name "Samarbhumi" \
            --verbose

      - name: Packaging (Linux - Debian Package)
        if: matrix.os == 'ubuntu-latest'
        run: |
          jpackage --type deb --name "Samarbhumi" --input . --main-jar Samarbhumi.jar --main-class Main \
            --icon resources/app_logo.png \
            --license-file INSTALLER_INFO.txt \
            --app-version 2.0.0 \
            --vendor "Shunya Labs" \
            --linux-shortcut \
            --description "A fast-paced 2D action shooter - War Never Ends" \
            --verbose

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            *.exe
            *.msi
            *.dmg
            *.deb
            Samarbhumi.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
